[project]
name = "U2FOLD"
version = "0.0.1"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Frank William Hammond Espinosa", email = "frank.william.hammond@gmail.com" }
]
requires-python = ">=3.13"

dependencies = [
  "torch",
  "torchvision",
  "tensorboard",
  "pillow"
]

[project.optional-dependencies]
dev = [
  "pytest",
  "ruff",
  "mypy"
]

# [project.urls]
# Repository = ""
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "src"]

[tool.mypy]
python_version = "3.13"
warn_unused_configs = true
warn_return_any = true
warn_unreachable = true
disallow_untyped_defs = true
files = ["src", "tests"]

[tool.ruff]
target-version = "py313"
src = ["src", "tests"]
line-length = 80

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
select = ["F", "E", "W", "I"]

[project.scripts]
u2fold = "u2fold:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
