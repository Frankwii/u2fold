[project]
name = "U2FOLD"
version = "0.0.2"
description = "U2FOLD: Underwater image unfolding"
readme = "README.md"
authors = [
    { name = "Frank William Hammond Espinosa", email = "frank.william.hammond@gmail.com" }
]
requires-python = ">=3.13"
keywords = ["Underwater imaging", "Unfolding", "Algorithm unrolling", "Algorithm unfolding"]

dependencies = [
  "torch",
  "torchvision",
  "tensorboard",
  "pillow"
]

[project.optional-dependencies]
dev = [
  "pytest",
  "ruff"
]

[project.urls]
repository = "https://github.com/Frankwii/u2fold"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "src"]

[tool.mypy]
python_version = "3.13"
warn_unused_configs = true
warn_return_any = true
warn_unreachable = true
disallow_untyped_defs = true
files = ["src", "tests"]

[tool.ruff]
target-version = "py313"
src = ["src", "tests"]
line-length = 80

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
select = ["F", "E", "W", "I"]

[project.scripts]
u2fold = "main:main"
profile = "main:profile"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
